# This file is based on the autogenerated one by maturin v1.7.8 with:
#
#    maturin generate-ci github
#
# Differences are:
# - removed x86, armv7, s390x, ppc64le targets from Linux
# - removed free-threaded wheels
# - removed musllinux
# - have separate linux-just-test and linux-min-versions-just-test jobs
# - add the `RUSTFLAGS: "-Dwarnings"` env variable

name: CI

on:
  release:
    types: [published]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Make sure CI fails on all warnings, including Clippy lints
env:
  RUSTFLAGS: "-Dwarnings"

jobs:
  workflow-metadata:
    runs-on: ubuntu-latest
    outputs:
      python-min: ${{ steps.metadata.outputs['python-min'] }}
      polars-min: ${{ steps.metadata.outputs['polars-min'] }}
    steps:
      - uses: actions/checkout@v6
      - name: Read workflow metadata
        id: metadata
        run: |
          python - <<'PY'
          import re
          import tomllib
          import os
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text())

          requires_python = data["project"]["requires-python"]
          python_match = re.fullmatch(r">=\s*(\d+\.\d+)", requires_python)
          if python_match is None:
              raise SystemExit(
                  f"Unsupported requires-python value: {requires_python!r}; expected '>=X.Y'"
              )

          def polars_min(requirements, source):
              matches = []
              for requirement in requirements:
                  match = re.fullmatch(r"polars>=\s*([^,\s]+)", requirement)
                  if match is not None:
                      matches.append(match.group(1))
              if len(matches) != 1:
                  raise SystemExit(
                      f"Expected exactly one polars minimum in {source}, found {matches!r}"
                  )
              return matches[0]

          build_polars = polars_min(data["build-system"]["requires"], "build-system.requires")
          dev_polars = polars_min(data["dependency-groups"]["dev"], "dependency-groups.dev")
          if build_polars != dev_polars:
              raise SystemExit(
                  "Polars minimum mismatch: "
                  f"build-system.requires has {build_polars}, dependency-groups.dev has {dev_polars}"
              )

          with Path(os.environ["GITHUB_OUTPUT"]).open("a") as output:
              output.write(f"python-min={python_match.group(1)}\n")
              output.write(f"polars-min={build_polars}\n")
          PY

  linux-just-test:
    needs: [workflow-metadata]
    runs-on: ubuntu-latest
    env:
      POLARS_VERBOSE: 1
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ needs['workflow-metadata'].outputs['python-min'] }}
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Rust
        run: rustup show
      - uses: mozilla-actions/sccache-action@v0.0.10
      - run: make venv
      # - run: make pre-commit
      - run: make install
      - run: make test

  linux-min-versions-just-test:
    needs: [workflow-metadata]
    runs-on: ubuntu-latest
    env:
      POLARS_VERBOSE: 1
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ needs['workflow-metadata'].outputs['python-min'] }}
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Rust
        run: rustup show
      - uses: mozilla-actions/sccache-action@v0.0.10
      - run: make venv
      - run: uv pip install polars==${{ needs['workflow-metadata'].outputs['polars-min'] }} # min version
      - run: make install
      - run: make test

  linux:
    needs: [workflow-metadata]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ needs['workflow-metadata'].outputs['python-min'] }}
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: "true"
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  windows:
    needs: [workflow-metadata]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ needs['workflow-metadata'].outputs['python-min'] }}
          architecture: ${{ matrix.platform.target }}
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: "true"
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  macos:
    needs: [workflow-metadata]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-26
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ needs['workflow-metadata'].outputs['python-min'] }}
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: "true"
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: dist

  attest-artifacts:
    name: Attest artifacts
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [linux, windows, macos, sdist]
    permissions:
      # Use to sign the release artifacts
      id-token: write
      contents: read
      # Used to generate artifact attestation
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/download-artifact@v8
      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: "wheels-*/*"

  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [linux, windows, macos, sdist]
    environment: pypi
    permissions:
      # Use to publish to PyPI with trusted publishing
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v8
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Publish to PyPI
        run: uv publish wheels-*/*
